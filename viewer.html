<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" id="tc" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Identificação de Lote — Agroquima</title>
<style>
:root{
  --bg:#0a1628;--bg2:#0f2040;--card:#162952;--border:#1e3a6a;
  --t1:#f0f6ff;--t2:#8fafd0;--t3:#4a6a96;
  --blue:#2b7fd4;--green:#35b87a;--amber:#e0a73a;--red:#e25c4d;
  --acc:var(--green);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--t1);min-height:100vh;
  padding:0 0 env(safe-area-inset-bottom,16px);
}

/* ── top accent bar ── */
.topbar{height:4px;background:var(--acc);width:100%;}

/* ── header ── */
.header{
  display:flex;flex-direction:column;align-items:center;
  padding:20px 20px 16px;gap:6px;border-bottom:1px solid var(--border);
}
.header img{height:40px;filter:brightness(0) invert(1);object-fit:contain;}
.header-sub{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);}

/* ── status hero ── */
.status-hero{
  margin:16px 16px 0;border-radius:16px;padding:20px;
  background:var(--acc);color:#fff;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.status-icon{font-size:36px;line-height:1;}
.status-label{font-size:20px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;}
.status-days{font-size:13px;opacity:.85;font-weight:500;}

/* ── section label ── */
.sec-label{
  font-size:10px;text-transform:uppercase;letter-spacing:.12em;
  color:var(--t3);margin-bottom:4px;
}

/* ── product card ── */
.product-card{
  margin:12px 16px 0;border-radius:14px;
  background:var(--card);border:1px solid var(--border);padding:16px;
}
.product-name{
  font-size:22px;font-weight:800;line-height:1.2;color:var(--t1);
  margin-bottom:4px;
}
.product-code{font-family:monospace;font-size:13px;color:var(--t2);}

/* ── lot card ── */
.lot-card{
  margin:10px 16px 0;border-radius:14px;
  background:#000;border:2px solid var(--acc);padding:16px;
}
.lot-number{
  font-family:'Courier New',monospace;font-size:32px;font-weight:900;
  letter-spacing:.06em;color:#fff;line-height:1;word-break:break-all;
}

/* ── grid cards ── */
.grid-2{
  margin:10px 16px 0;display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.info-card{
  border-radius:12px;background:var(--card);
  border:1px solid var(--border);padding:12px;
}
.info-value{font-size:17px;font-weight:700;color:var(--t1);margin-top:2px;}
.info-value.mono{font-family:'Courier New',monospace;}
.info-value.big{font-size:24px;}

/* ── full-width info card ── */
.info-card-full{
  margin:10px 16px 0;border-radius:12px;
  background:var(--card);border:1px solid var(--border);padding:12px;
}
.fab-value{font-size:15px;font-weight:600;color:var(--t1);margin-top:2px;line-height:1.4;}

/* ── divider ── */
.divider{margin:16px 16px 0;border:none;border-top:1px solid var(--border);}

/* ── footer ── */
.footer{
  margin:16px 16px 0;padding-bottom:24px;
  text-align:center;font-size:11px;color:var(--t3);line-height:1.8;
}
.footer strong{color:var(--t2);}

/* ── error state ── */
.error-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:70vh;padding:32px;text-align:center;gap:12px;
}
.error-icon{font-size:48px;}
.error-title{font-size:18px;font-weight:700;color:var(--t1);}
.error-sub{font-size:14px;color:var(--t2);line-height:1.6;}

/* validade highlight */
.venc-ok   {color:var(--green);}
.venc-warn {color:var(--amber);}
.venc-bad  {color:var(--red);text-decoration:underline;text-decoration-style:wavy;}

/* fade-in */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}
.page{animation:fadeUp .35s ease both;}
</style>
</head>

  function decode(hash){
    try{ return JSON.parse(decodeURIComponent(escape(atob(hash)))); }catch(e){ return null; }
  }

  function esc(s){
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderError(){
    document.getElementById('root').innerHTML =
      '<div class="error-wrap">'
      +'<div class="error-icon">&#128683;</div>'
      +'<div class="error-title">Link inv&aacute;lido</div>'
      +'<div class="error-sub">Este QR code n&atilde;o cont&eacute;m dados de lote v&aacute;lidos.<br>Gere uma nova placa pelo sistema.</div>'
      +'</div>';
  }

  function render(d){
    /* determine accent color */
    var st = (d.st||'').toLowerCase();
    var acc = '#35b87a', statusClass = 'venc-ok';
    var statusIcon = '&#10003;', daysLabel = '';
    var dias = parseInt(d.d, 10);
    if (st.indexOf('vencido') !== -1) {
      acc = '#e25c4d'; statusClass = 'venc-bad';
      statusIcon = '&#10005;';
      daysLabel = isNaN(dias) ? '' : ('Vencido h&aacute; ' + Math.abs(dias) + ' dia' + (Math.abs(dias)===1?'':'s'));
    } else if (st.indexOf('próximo') !== -1 || st.indexOf('proximo') !== -1) {
      acc = '#e0a73a'; statusClass = 'venc-warn';
      statusIcon = '&#9888;';
      daysLabel = isNaN(dias) ? '' : (dias + ' dia' + (dias===1?'':'s') + ' at&eacute; o vencimento');
    } else {
      daysLabel = isNaN(dias) ? '' : (dias + ' dia' + (dias===1?'':'s') + ' at&eacute; o vencimento');
    }

    /* update theme color */
    var tc = document.getElementById('tc');
    if(tc) tc.setAttribute('content', acc);

    /* filial label */
    var filialLabel = esc(d.fc) + (d.fn ? ' &mdash; ' + esc(d.fn) : '');
    var linhaLabel  = (d.lc ? 'Linha ' + esc(d.lc) + ' &mdash; ' : '') + esc(d.ln||'');

    /* fabricante: strip leading "XX - " */
    var fab = esc(d.fab||'—').replace(/^\d+ - /, '');

    /* validade style class */
    var dvClass = statusClass;

    document.getElementById('root').innerHTML =
      '<div class="page">'
      +'<div class="topbar" style="background:'+acc+'"></div>'

      /* header */
      +'<div class="header">'
      +'<img src="'+LOGO+'" alt="Agroquima" />'
      +'<div class="header-sub">Identifica&ccedil;&atilde;o de Lote</div>'
      +'</div>'

      /* status hero */
      +'<div class="status-hero" style="background:'+acc+';">'
      +'<div class="status-icon">'+statusIcon+'</div>'
      +'<div class="status-label">'+esc(d.st||'')+'</div>'
      +(daysLabel ? '<div class="status-days">'+daysLabel+'</div>' : '')
      +'</div>'

      /* product */
      +'<div class="product-card">'
      +'<div class="sec-label">Produto</div>'
      +'<div class="product-name">'+esc(d.np||'—')+'</div>'
      +'<div class="product-code">C&oacute;d: '+esc(d.cp||'—')+'</div>'
      +'</div>'

      /* lot number */
      +'<div class="lot-card" style="border-color:'+acc+';">'
      +'<div class="sec-label" style="color:#aaa;">N&uacute;mero do Lote</div>'
      +'<div class="lot-number">'+esc(d.lt||'—')+'</div>'
      +'</div>'

      /* dates */
      +'<div class="grid-2">'
      +'<div class="info-card"><div class="sec-label">Fabrica&ccedil;&atilde;o</div><div class="info-value mono">'+esc(d.df||'—')+'</div></div>'
      +'<div class="info-card"><div class="sec-label">Validade</div><div class="info-value mono '+dvClass+'">'+esc(d.dv||'—')+'</div></div>'
      +'</div>'

      /* filial + linha */
      +'<div class="grid-2">'
      +'<div class="info-card"><div class="sec-label">Filial</div><div class="info-value" style="font-size:14px;line-height:1.3;">'+filialLabel+'</div></div>'
      +'<div class="info-card"><div class="sec-label">Linha</div><div class="info-value" style="font-size:14px;line-height:1.3;">'+linhaLabel+'</div></div>'
      +'</div>'

      /* qty */
      +'<div class="info-card-full">'
      +'<div class="sec-label">Quantidade em estoque</div>'
      +'<div class="info-value mono big">'+esc(d.q||'—')+'</div>'
      +'</div>'

      /* fabricante */
      +'<div class="info-card-full">'
      +'<div class="sec-label">Fabricante</div>'
      +'<div class="fab-value">'+fab+'</div>'
      +'</div>'

      +'<hr class="divider">'

      /* footer */
      +'<div class="footer">'
      +'Impresso em <strong>'+esc(d.i||'—')+'</strong><br>'
      +'<strong>Agroquima Produtos Agropecu&aacute;rios</strong><br>'
      +'Controle de Lotes'
      +'</div>'

      +'</div>';
  }

  var raw = location.hash.slice(1);
  if (!raw) { renderError(); return; }
  var d = decode(raw);
  if (!d) { renderError(); return; }
  render(d);
})();
</script>
