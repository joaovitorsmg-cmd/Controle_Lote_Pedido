<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" id="tc" content="#35b87a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Identificação de Lote — Agroquima</title>
<style>
:root{
  --acc:#35b87a;--acc-bg:#e8f7f0;
  --bg:#f4f7fb;--card:#fff;--border:#e2e8f0;
  --t1:#1a202c;--t2:#4a5568;--t3:#a0aec0;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--t1);min-height:100vh;
  padding:0 0 env(safe-area-inset-bottom,16px);
}

/* topbar */
.topbar{height:5px;background:var(--acc);width:100%;}

/* header */
.header{
  display:flex;flex-direction:column;align-items:center;
  padding:18px 20px 14px;gap:4px;
  border-bottom:1px solid var(--border);background:#fff;
}
.header img{height:44px;object-fit:contain;}
.header-sub{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--t3);font-weight:600;}

/* status hero */
.status-hero{
  margin:14px 16px 0;border-radius:18px;padding:20px;
  background:var(--acc);color:#fff;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  box-shadow:0 4px 18px rgba(0,0,0,.13);
  position:relative;overflow:hidden;
}
.s-icon{font-size:36px;line-height:1;}
.s-label{font-size:20px;font-weight:900;letter-spacing:.07em;text-transform:uppercase;}
.s-days{font-size:13px;opacity:.9;font-weight:500;}
.s-realtime{
  margin-top:4px;font-size:10px;opacity:.8;font-weight:600;
  text-transform:uppercase;letter-spacing:.1em;
  display:flex;align-items:center;gap:4px;
}
.s-realtime::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:#fff;opacity:.9;}

/* pulse for vencido */
@keyframes pulseBad{0%,100%{box-shadow:0 4px 18px rgba(226,92,77,.3);}50%{box-shadow:0 4px 32px rgba(226,92,77,.55);}}
.pulse-bad{animation:pulseBad 2s ease infinite;}
@keyframes pulseWarn{0%,100%{box-shadow:0 4px 18px rgba(224,167,58,.25);}50%{box-shadow:0 4px 28px rgba(224,167,58,.5);}}
.pulse-warn{animation:pulseWarn 3s ease infinite;}

/* vence hoje badge */
.hoje-badge{
  margin-top:2px;padding:3px 10px;border-radius:999px;
  background:rgba(255,255,255,.22);font-size:11px;font-weight:800;
  text-transform:uppercase;letter-spacing:.1em;
}

/* progress bar */
.progress-wrap{
  margin:10px 16px 0;border-radius:12px;
  background:var(--card);border:1px solid var(--border);
  padding:12px 14px 14px;box-shadow:var(--shadow);
}
.progress-label-row{display:flex;justify-content:space-between;margin-bottom:8px;}
.progress-label-row span{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;}
.progress-track{
  height:10px;border-radius:999px;background:#e9eef5;
  position:relative;overflow:visible;
}
.progress-fill{
  height:100%;border-radius:999px;background:var(--acc);
  transition:width .5s ease;max-width:100%;min-width:4px;
}
.progress-thumb{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  width:16px;height:16px;border-radius:50%;background:var(--acc);
  border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25);
  transition:left .5s ease;
}
.progress-pct{
  text-align:center;font-size:10px;color:var(--t3);margin-top:6px;font-weight:600;
}

/* section label */
.sec-label{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);margin-bottom:4px;font-weight:600;}

/* product card */
.product-card{
  margin:10px 16px 0;border-radius:14px;
  background:var(--card);border:1px solid var(--border);
  padding:14px;box-shadow:var(--shadow);
  border-left:3px solid var(--acc);
}
.product-name{font-size:19px;font-weight:800;line-height:1.2;color:var(--t1);margin-bottom:4px;}
.product-code{font-family:monospace;font-size:12px;color:var(--t2);}

/* lot card */
.lot-card{
  margin:10px 16px 0;border-radius:14px;
  background:var(--t1);border:2px solid var(--acc);padding:14px;
  box-shadow:var(--shadow);
}
.lot-number{
  font-family:'Courier New',monospace;font-size:28px;font-weight:900;
  letter-spacing:.06em;color:#fff;line-height:1.1;word-break:break-all;
}

/* grid */
.grid-2{margin:10px 16px 0;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-card{
  border-radius:12px;background:var(--card);
  border:1px solid var(--border);padding:12px;box-shadow:var(--shadow);
}
.i-val{font-size:15px;font-weight:700;color:var(--t1);margin-top:2px;}
.i-val.mono{font-family:'Courier New',monospace;}
.i-val.big{font-size:24px;}
.venc-ok  {color:#1a9e60;}
.venc-warn{color:#a06a00;}
.venc-bad {color:#c0392b;text-decoration:underline;text-decoration-style:wavy;}

/* full-width card */
.info-full{
  margin:10px 16px 0;border-radius:12px;
  background:var(--card);border:1px solid var(--border);padding:12px;
  box-shadow:var(--shadow);
}
.fab-val{font-size:14px;font-weight:600;color:var(--t1);margin-top:2px;line-height:1.4;}

/* zero-stock chip */
.zero-stock{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:6px;padding:4px 10px;border-radius:999px;
  background:#fff3e0;border:1px solid #f5c06a;
  font-size:11px;font-weight:700;color:#a06a00;
  text-transform:uppercase;letter-spacing:.08em;
}

/* fallback badge */
.fallback-note{
  margin-top:6px;font-size:10px;color:var(--t3);font-style:italic;
}

/* divider */
.divider{margin:16px 16px 0;border:none;border-top:1px solid var(--border);}

/* footer */
.footer{
  margin:14px 16px 0;padding-bottom:24px;
  text-align:center;font-size:11px;color:var(--t3);line-height:1.9;
}
.footer strong{color:var(--t2);}
.footer-row{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:4px;}
.footer-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:999px;
  background:var(--card);border:1px solid var(--border);
  font-size:10px;font-weight:600;color:var(--t2);
}

/* error state */
.error-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:70vh;padding:32px;text-align:center;gap:12px;
}
.error-icon{font-size:48px;}
.error-title{font-size:18px;font-weight:700;color:var(--t1);}
.error-sub{font-size:14px;color:var(--t2);line-height:1.6;}

/* fade-in */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.page{animation:fadeUp .32s ease both;}
</style>
</head>

  function parseDMY(s){
    if(!s || s==='—') return null;
    var m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(!m) return null;
    var d = new Date(+m[3], +m[2]-1, +m[1]);
    d.setHours(0,0,0,0);
    return isNaN(d.getTime()) ? null : d;
  }

  /* Today at midnight */
  function today(){
    var d = new Date();
    d.setHours(0,0,0,0);
    return d;
  }

  /* Format Date → "DD/MM/YYYY" */
  function fmtDate(d){
    if(!d) return '—';
    var dd = String(d.getDate()).padStart(2,'0');
    var mm = String(d.getMonth()+1).padStart(2,'0');
    return dd+'/'+mm+'/'+d.getFullYear();
  }

  /*
   * Determine real-time status from the expiry date string.
   * Thresholds mirror the app: <=90 days → Próximo, <0 → Vencido, >90 → Válido.
   * Returns { st, dias, realtime }
   *   st       : 'Válido' | 'Próximo' | 'Vencido'
   *   dias     : integer days remaining (negative = already expired)
   *   realtime : true if calculated from dv, false if fell back to stored value
   */
  function calcStatus(dvStr, storedSt, storedD){
    var dtVenc = parseDMY(dvStr);
    if(dtVenc){
      var diff  = dtVenc - today();
      var dias  = Math.ceil(diff / 86400000);  /* 86400000ms = 1 day */
      var st    = dias < 0 ? 'Vencido' : dias <= 90 ? 'Próximo' : 'Válido';
      return { st:st, dias:dias, realtime:true };
    }
    /* fallback: use values baked into QR at print time */
    var d = parseInt(storedD, 10);
    return { st: storedSt||'Válido', dias: isNaN(d)?null:d, realtime:false };
  }

  /* Build progress bar HTML (fabricação → hoje → validade) */
  function makeProgress(dfStr, dvStr){
    var dtFab  = parseDMY(dfStr);
    var dtVenc = parseDMY(dvStr);
    if(!dtFab || !dtVenc) return '';
    var span  = dtVenc - dtFab;
    if(span <= 0) return '';
    var pct   = Math.round((today() - dtFab) / span * 100);
    var pctClamped = Math.min(Math.max(pct, 2), 100);
    var barColor = pct > 100 ? '#e25c4d' : pct > 80 ? '#e0a73a' : '#35b87a';
    return '<div class="progress-wrap">'
      +'<div class="progress-label-row">'
      +'<span>Fab. '+esc(dfStr)+'</span>'
      +'<span>Val. '+esc(dvStr)+'</span>'
      +'</div>'
      +'<div class="progress-track">'
      +'<div class="progress-fill" style="width:'+pctClamped+'%;background:'+barColor+';"></div>'
      +'<div class="progress-thumb" style="left:'+pctClamped+'%;background:'+barColor+';"></div>'
      +'</div>'
      +'<div class="progress-pct">'+(pct>100?'Vencido':'Vida útil usada: '+pct+'%')+'</div>'
      +'</div>';
  }

  function renderError(){
    document.getElementById('root').innerHTML =
      '<div class="error-wrap">'
      +'<div class="error-icon">&#128683;</div>'
      +'<div class="error-title">Link inv&aacute;lido</div>'
      +'<div class="error-sub">Este QR code n&atilde;o cont&eacute;m dados de lote v&aacute;lidos.<br>Gere uma nova placa pelo sistema.</div>'
      +'</div>';
  }

  function render(d){
    /* ── 1. Status em tempo real ── */
    var cs     = calcStatus(d.dv, d.st, d.d);
    var acc, accPulse, heroClass;
    var statusIcon, statusLabel, daysMsg;

    if(cs.st === 'Vencido'){
      acc = '#e25c4d'; accPulse = 'pulse-bad';
      statusIcon  = '&#10005;';
      statusLabel = 'Vencido';
      daysMsg     = cs.dias !== null
        ? 'Vencido h&aacute; '+ Math.abs(cs.dias) +' dia'+(Math.abs(cs.dias)===1?'':'s')
        : 'Produto vencido';
    } else if(cs.st === 'Próximo'){
      acc = '#e0a73a'; accPulse = 'pulse-warn';
      statusIcon  = '&#9888;';
      statusLabel = 'Pr&oacute;ximo do Vencimento';
      if(cs.dias === 0){
        daysMsg = 'Vence <strong>hoje</strong>!';
      } else {
        daysMsg = cs.dias !== null
          ? cs.dias+' dia'+(cs.dias===1?'':'s')+' para vencer'
          : 'Pr&oacute;ximo do vencimento';
      }
    } else {
      acc = '#35b87a'; accPulse = '';
      statusIcon  = '&#10003;';
      statusLabel = 'V&aacute;lido';
      daysMsg     = cs.dias !== null
        ? cs.dias+' dia'+(cs.dias===1?'':'s')+' at&eacute; o vencimento'
        : 'Produto v&aacute;lido';
    }

    /* ── 2. Theme ── */
    document.getElementById('tc').setAttribute('content', acc);
    document.documentElement.style.setProperty('--acc', acc);
    document.documentElement.style.setProperty('--acc-bg',
      cs.st==='Vencido'?'#fdecea': cs.st==='Próximo'?'#fef7e0':'#e8f7f0');

    /* ── 3. Labels ── */
    var filialLabel = esc(d.fc) + (d.fn ? ' &mdash; '+esc(d.fn) : '');
    var linhaLabel  = (d.lc ? 'Linha '+esc(d.lc)+' &mdash; ' : '') + esc(d.ln||'');

    var fabRaw   = d.fab || '';
    var fabMatch = fabRaw.match(/^(\d+)\s*-\s*(.+)$/);
    var fabCod   = fabMatch ? fabMatch[1] : '';
    var fabNome  = fabMatch ? fabMatch[2] : fabRaw;

    var dvClass  = cs.st==='Vencido'?'venc-bad': cs.st==='Próximo'?'venc-warn':'venc-ok';

    /* ── 4. Quantidade zero ── */
    var qty     = parseInt(d.q, 10);
    var qtyDisp = isNaN(qty) ? (d.q||'—') : String(qty);
    var zeroStockHtml = (!isNaN(qty) && qty === 0)
      ? '<div class="zero-stock">&#9888; Sem estoque registrado</div>'
      : '';

    /* ── 5. Progress bar ── */
    var progressHtml = makeProgress(d.df, d.dv);

    /* ── 6. Realtime badge ── */
    var realtimeBadge = '<div class="s-realtime">'
      +(cs.realtime ? 'Calculado agora em tempo real' : 'Situação na data de impressão')
      +'</div>';

    /* ── 7. Footer dates ── */
    var todayStr = fmtDate(today());
    var footerChips = '<div class="footer-row">'
      +'<div class="footer-chip">&#128197; Gerado em '+esc(d.i||'—')+'</div>'
      +(cs.realtime ? '<div class="footer-chip" style="color:'+acc+';border-color:'+acc+';">&#10003; Consultado em '+esc(todayStr)+'</div>' : '')
      +'</div>';

    /* ── 8. Render ── */
    document.getElementById('root').innerHTML =
      '<div class="page">'
      +'<div class="topbar"></div>'

      +'<div class="header">'
      +'<img src="'+LOGO+'" alt="Agroquima"/>'
      +'<div class="header-sub">Identifica&ccedil;&atilde;o de Lote</div>'
      +'</div>'

      +'<div class="status-hero '+accPulse+'" style="background:'+acc+';">'
      +'<div class="s-icon">'+statusIcon+'</div>'
      +'<div class="s-label">'+statusLabel+'</div>'
      +'<div class="s-days">'+daysMsg+'</div>'
      +realtimeBadge
      +'</div>'

      +'<div class="product-card">'
      +'<div class="sec-label">Produto</div>'
      +'<div class="product-name">'+esc(d.np||'—')+'</div>'
      +'<div class="product-code">C&oacute;d: '+esc(d.cp||'—')+'</div>'
      +'</div>'

      +'<div class="lot-card">'
      +'<div class="sec-label" style="color:#888;">N&uacute;mero do Lote</div>'
      +'<div class="lot-number">'+esc(d.lt||'—')+'</div>'
      +'</div>'

      +'<div class="grid-2">'
      +'<div class="info-card"><div class="sec-label">Fabrica&ccedil;&atilde;o</div>'
      +'<div class="i-val mono">'+esc(d.df||'—')+'</div></div>'
      +'<div class="info-card"><div class="sec-label">Validade</div>'
      +'<div class="i-val mono '+dvClass+'">'+esc(d.dv||'—')+'</div></div>'
      +'</div>'

      + progressHtml

      +'<div class="grid-2">'
      +'<div class="info-card"><div class="sec-label">Filial</div>'
      +'<div class="i-val" style="font-size:13px;line-height:1.3;">'+filialLabel+'</div></div>'
      +'<div class="info-card"><div class="sec-label">Linha</div>'
      +'<div class="i-val" style="font-size:13px;line-height:1.3;">'+linhaLabel+'</div></div>'
      +'</div>'

      +'<div class="info-full">'
      +'<div class="sec-label">Quantidade em estoque</div>'
      +'<div class="i-val mono big">'+esc(qtyDisp)+'</div>'
      +zeroStockHtml
      +'</div>'

      +'<div class="info-full">'
      +'<div class="sec-label">Fornecedor</div>'
      +(fabCod ? '<div class="product-code" style="margin-bottom:4px;">C&oacute;d: <strong>'+esc(fabCod)+'</strong></div>' : '')
      +'<div class="fab-val">'+esc(fabNome||'—')+'</div>'
      +'</div>'

      +'<hr class="divider">'

      +'<div class="footer">'
      +'<strong>Agroquima Produtos Agropecu&aacute;rios</strong><br>'
      +'Controle de Lotes'
      +footerChips
      +'</div>'

      +'</div>';
  }

  var raw = location.hash.slice(1);
  if(!raw){ renderError(); return; }
  var d = decode(raw);
  if(!d){ renderError(); return; }
  render(d);
})();
</script>
</body>
</html>
